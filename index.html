<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EdgeJournal</title>

  <style>
    body{
      margin:0;
      background:#f3f4f6;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
      text-align:center;
      width:500px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
      color:#111827;
    }

    p{
      color:#6b7280;
      margin-bottom:30px;
    }

    .stats{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    .box{
      background:#f9fafb;
      padding:20px;
      border-radius:15px;
    }

    .value{
      font-size:28px;
      font-weight:bold;
      margin-top:10px;
    }

    .green{
      color:#16a34a;
    }
  </style>
</head>

<body>

<div class="card">

  <h1>EdgeJournal</h1>

  <p>Trading Performance Dashboard</p>

  <div class="stats">

    <div class="box">
      Equity
      <div class="value">10,250€</div>
    </div>

    <div class="box">
      Profitto
      <div class="value green">+12.4%</div>
    </div>

    <div class="box">
      Win Rate
      <div class="value">68%</div>
    </div>

    <div class="box">
      Avg Daily Gain
      <div class="value green">+1.2%</div>
    </div>

  </div>

</div>

</body>
</html>
