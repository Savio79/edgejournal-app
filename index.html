<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeJournal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f3f4f6;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#111827;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu button{
background:#1f2937;
border:none;
padding:15px;
border-radius:12px;
color:white;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.menu button:hover{
background:#374151;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.title{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#6b7280;
margin-bottom:40px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-title{
color:#6b7280;
margin-bottom:10px;
}

.card-value{
font-size:32px;
font-weight:bold;
}

.green{
color:#16a34a;
}

.red{
color:#dc2626;
}

/* TABLE */

.table-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
padding:15px;
text-align:left;
border-bottom:1px solid #e5e7eb;
}

th{
color:#6b7280;
}

/* PAGE CONTENT */

.page-content{
margin-top:30px;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
font-size:18px;
line-height:1.7;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
EdgeJournal
</div>

<div class="menu">

<button onclick="showPage('dashboard')">
Dashboard
</button>

<button onclick="showPage('trades')">
Trades
</button>

<button onclick="showPage('analytics')">
Analytics
</button>

<button onclick="showPage('calendar')">
Calendario
</button>

<button onclick="showPage('settings')">
Settings
</button>

</div>

</div>

<div class="main">

<div class="title" id="pageTitle">
Dashboard
</div>

<div class="subtitle" id="pageSubtitle">
Benvenuto nel tuo Trading Journal
</div>

<div class="cards" id="cardsSection">

<div class="card">
<div class="card-title">Equity</div>
<div class="card-value">10,250€</div>
</div>

<div class="card">
<div class="card-title">Profitto Totale</div>
<div class="card-value green">+12.4%</div>
</div>

<div class="card">
<div class="card-title">Win Rate</div>
<div class="card-value">68%</div>
</div>

<div class="card">
<div class="card-title">Profitto Medio</div>
<div class="card-value green">+1.2%</div>
</div>

</div>

<div class="table-box" id="tableSection">

<h2>Ultimi Trade</h2>

<table>

<tr>
<th>Asset</th>
<th>Tipo</th>
<th>Profit/Loss</th>
</tr>

<tr>
<td>XAU/USD</td>
<td>LONG</td>
<td class="green">+250€</td>
</tr>

<tr>
<td>US30</td>
<td>SHORT</td>
<td class="red">-80€</td>
</tr>

<tr>
<td>BTC/USD</td>
<td>LONG</td>
<td class="green">+420€</td>
</tr>

</table>

</div>

<div class="page-content" id="dynamicContent">

Questa è la dashboard principale del tuo EdgeJournal.

</div>

</div>

<script>

function showPage(page){

const title = document.getElementById("pageTitle");
const subtitle = document.getElementById("pageSubtitle");
const content = document.getElementById("dynamicContent");

if(page === "dashboard"){

title.innerText = "Dashboard";

subtitle.innerText = "Benvenuto nel tuo Trading Journal";

content.innerHTML = `
La dashboard mostra:
<ul>
<li>Equity totale</li>
<li>Performance account</li>
<li>Ultimi trade</li>
<li>Statistiche generali</li>
</ul>
`;

}

if(page === "trades"){

title.innerText = "Trades";

subtitle.innerText = "Gestione operazioni trading";

content.innerHTML = `
<h3>Lista Trades</h3>

<p>Qui potrai:</p>

<ul>
<li>Aggiungere trade</li>
<li>Modificare trade</li>
<li>Eliminare trade</li>
<li>Inserire screenshot</li>
</ul>
`;

}

if(page === "analytics"){

title.innerText = "Analytics";

subtitle.innerText = "Statistiche e performance";

content.innerHTML = `
<h3>Analytics</h3>

<p>Qui vedrai:</p>

<ul>
<li>Win Rate</li>
<li>Profit Factor</li>
<li>Drawdown</li>
<li>Performance mensile</li>
</ul>
`;

}

if(page === "calendar"){

title.innerText = "Calendario";

subtitle.innerText = "Calendario operazioni";

content.innerHTML = `
<h3>Calendario Trading</h3>

<p>Qui appariranno:</p>

<ul>
<li>Trade giornalieri</li>
<li>Eventi economici</li>
<li>Storico operazioni</li>
</ul>
`;

}

if(page === "settings"){

title.innerText = "Settings";

subtitle.innerText = "Configurazione piattaforma";

content.innerHTML = `
<h3>Impostazioni</h3>

<p>Qui potrai configurare:</p>

<ul>
<li>Profilo utente</li>
<li>Tema</li>
<li>Notifiche</li>
<li>Broker</li>
</ul>
`;

}

}

</script>

</body>
</html>
