```html
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeJournal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
background:#f3f4f6;
height:100vh;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#111827;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu button{
background:#1f2937;
border:none;
padding:15px;
border-radius:12px;
color:white;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

.menu button:hover{
background:#374151;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.title{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#6b7280;
margin-bottom:40px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-title{
color:#6b7280;
margin-bottom:10px;
}

.card-value{
font-size:32px;
font-weight:bold;
}

.green{
color:#16a34a;
}

.red{
color:#dc2626;
}

/* TABLE */

.table-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
padding:15px;
text-align:left;
border-bottom:1px solid #e5e7eb;
}

th{
color:#6b7280;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
EdgeJournal
</div>

<div class="menu">
<button onclick="alert('Dashboard cliccata!')">Dashboard</button>
<button>Trades</button>
<button>Analytics</button>
<button>Calendario</button>
<button>Settings</button>
</div>

</div>

<div class="main">

<div class="title">
Dashboard
</div>

<div class="subtitle">
Benvenuto nel tuo Trading Journal
</div>

<div class="cards">

<div class="card">
<div class="card-title">Equity</div>
<div class="card-value">10,250€</div>
</div>

<div class="card">
<div class="card-title">Profitto Totale</div>
<div class="card-value green">+12.4%</div>
</div>

<div class="card">
<div class="card-title">Win Rate</div>
<div class="card-value">68%</div>
</div>

<div class="card">
<div class="card-title">Profitto Medio</div>
<div class="card-value green">+1.2%</div>
</div>

</div>

<div class="table-box">

<h2>Ultimi Trade</h2>

<table>

<tr>
<th>Asset</th>
<th>Tipo</th>
<th>Profit/Loss</th>
</tr>

<tr>
<td>XAU/USD</td>
<td>LONG</td>
<td class="green">+250€</td>
</tr>

<tr>
<td>US30</td>
<td>SHORT</td>
<td class="red">-80€</td>
</tr>

<tr>
<td>BTC/USD</td>
<td>LONG</td>
<td class="green">+420€</td>
</tr>

</table>

</div>

</div>

</body>
</html>
```
