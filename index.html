<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeJournal Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f3f4f6;
height:100vh;
overflow:hidden;
transition:0.3s;
}

/* DARK MODE */

body.dark{
background:#111827;
color:white;
}

body.dark .card,
body.dark .table-box,
body.dark .page-content,
body.dark .analytics-box{
background:#1f2937;
color:white;
}

body.dark th{
color:#d1d5db;
}

body.dark td{
border-bottom:1px solid #374151;
}

body.dark input,
body.dark select{
background:#111827;
color:white;
border:1px solid #374151;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#111827;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:30px;
font-weight:bold;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu button{
background:#1f2937;
border:none;
padding:15px;
border-radius:12px;
color:white;
cursor:pointer;
font-size:16px;
transition:0.2s;
text-align:left;
}

.menu button:hover{
background:#374151;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.title{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#6b7280;
margin-bottom:40px;
}

body.dark .subtitle{
color:#d1d5db;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-title{
color:#6b7280;
margin-bottom:10px;
}

body.dark .card-title{
color:#d1d5db;
}

.card-value{
font-size:32px;
font-weight:bold;
}

.green{
color:#16a34a;
}

.red{
color:#dc2626;
}

/* TABLE */

.table-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
padding:15px;
text-align:left;
border-bottom:1px solid #e5e7eb;
}

/* FORM */

.trade-form{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
margin-top:20px;
}

.trade-form input,
.trade-form select{
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
font-size:16px;
}

.trade-form button{
background:#111827;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.trade-form button:hover{
background:#374151;
}

/* PAGE CONTENT */

.page-content{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
font-size:18px;
line-height:1.8;
}

/* ANALYTICS */

.analytics-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
margin-bottom:30px;
}

.analytics-box{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.analytics-title{
font-size:18px;
margin-bottom:10px;
color:#6b7280;
}

.analytics-value{
font-size:28px;
font-weight:bold;
}

/* SETTINGS */

.setting-btn{
margin-top:20px;
padding:14px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
background:#111827;
color:white;
}

.setting-btn:hover{
background:#374151;
}

canvas{
margin-top:30px;
background:white;
padding:20px;
border-radius:20px;
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">
EdgeJournal
</div>

<div class="menu">

<button onclick="showPage('dashboard')">
Dashboard
</button>

<button onclick="showPage('analytics')">
Analytics
</button>

<button onclick="showPage('calendar')">
Calendario
</button>

<button onclick="showPage('settings')">
Settings
</button>

</div>

</div>

<div class="main">

<div class="title" id="pageTitle">
Dashboard
</div>

<div class="subtitle" id="pageSubtitle">
Benvenuto nel tuo Trading Journal
</div>

<div id="dashboardSection">

<div class="cards">

<div class="card">
<div class="card-title">Equity</div>
<div class="card-value" id="equityValue">
0€
</div>
</div>

<div class="card">
<div class="card-title">Profitto Totale</div>
<div class="card-value" id="profitValue">
0€
</div>
</div>

<div class="card">
<div class="card-title">Win Rate</div>
<div class="card-value" id="winrateValue">
0%
</div>
</div>

<div class="card">
<div class="card-title">Trade Totali</div>
<div class="card-value" id="totalTradesValue">
0
</div>
</div>

</div>

<div class="table-box">

<h2>Ultimi Trade</h2>

<div class="trade-form">

<input type="date" id="dateInput">

<input type="text" id="assetInput" placeholder="Asset">

<select id="typeInput">
<option>LONG</option>
<option>SHORT</option>
</select>

<input type="number" id="profitInput" placeholder="Profit/Loss">

<button onclick="addTrade()">
Aggiungi Trade
</button>

</div>

<table id="tradeTable">

<tr>
<th>Data</th>
<th>Asset</th>
<th>Tipo</th>
<th>Profit/Loss</th>
<th>Azione</th>
</tr>

</table>

</div>

</div>

<div class="page-content" id="dynamicContent">

Dashboard caricata.

</div>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || [];

let equity =
localStorage.getItem("equity") || 0;

/* FIRST EQUITY */

if(equity == 0){

let userEquity =
prompt("Inserisci il tuo capitale iniziale");

if(userEquity){

equity = userEquity;

localStorage.setItem("equity", equity);

}

}

/* SAVE */

function saveTrades(){

localStorage.setItem("trades", JSON.stringify(trades));

}

/* LOAD TABLE */

function loadTrades(){

const table = document.getElementById("tradeTable");

table.innerHTML = `
<tr>
<th>Data</th>
<th>Asset</th>
<th>Tipo</th>
<th>Profit/Loss</th>
<th>Azione</th>
</tr>
`;

trades.forEach((trade,index)=>{

const row = table.insertRow(-1);

const cell0 = row.insertCell(0);
const cell1 = row.insertCell(1);
const cell2 = row.insertCell(2);
const cell3 = row.insertCell(3);
const cell4 = row.insertCell(4);

cell0.innerHTML = trade.date;
cell1.innerHTML = trade.asset;
cell2.innerHTML = trade.type;

if(parseFloat(trade.profit)>=0){

cell3.innerHTML =
`<span class="green">+${trade.profit}€</span>`;

}else{

cell3.innerHTML =
`<span class="red">${trade.profit}€</span>`;

}

cell4.innerHTML =
`<button onclick="deleteTrade(${index})">
Elimina
</button>`;

});

updateStats();

}

/* ADD TRADE */

function addTrade(){

const date =
document.getElementById("dateInput").value;

const asset =
document.getElementById("assetInput").value;

const type =
document.getElementById("typeInput").value;

const profit =
document.getElementById("profitInput").value;

if(date === "" || asset === "" || profit === ""){

alert("Compila tutti i campi");

return;

}

trades.push({
date: date,
asset: asset,
type: type,
profit: profit
});

saveTrades();

loadTrades();

document.getElementById("dateInput").value = "";
document.getElementById("assetInput").value = "";
document.getElementById("profitInput").value = "";

}

/* DELETE */

function deleteTrade(index){

trades.splice(index,1);

saveTrades();

loadTrades();

}

/* UPDATE STATS */

function updateStats(){

let totalProfit = 0;

let wins = 0;

trades.forEach(trade=>{

const p = parseFloat(trade.profit);

totalProfit += p;

if(p > 0){
wins++;
}

});

const totalTrades = trades.length;

let winrate = 0;

if(totalTrades > 0){

winrate =
Math.round((wins / totalTrades) * 100);

}

document.getElementById("equityValue").innerHTML =
parseFloat(equity) >= 0
? `<span class="green">${equity}€</span>`
: `<span class="red">${equity}€</span>`;

document.getElementById("profitValue").innerHTML =
totalProfit >= 0
? `<span class="green">${totalProfit}€</span>`
: `<span class="red">${totalProfit}€</span>`;

document.getElementById("winrateValue").innerText =
winrate + "%";

document.getElementById("totalTradesValue").innerText =
totalTrades;

}

/* MENU */

function showPage(page){

const title =
document.getElementById("pageTitle");

const subtitle =
document.getElementById("pageSubtitle");

const content =
document.getElementById("dynamicContent");

const dashboard =
document.getElementById("dashboardSection");

/* DASHBOARD */

if(page === "dashboard"){

dashboard.style.display = "block";

content.style.display = "block";

title.innerText = "Dashboard";

subtitle.innerText =
"Panoramica generale account";

content.innerHTML = `
<h3>Dashboard Operativa</h3>

<p>Gestisci e monitora tutte le operazioni trading.</p>
`;

}

/* ANALYTICS */

if(page === "analytics"){

dashboard.style.display = "none";

content.style.display = "block";

title.innerText = "Analytics";

subtitle.innerText =
"Statistiche avanzate";

let daily = 0;
let monthly = 0;
let yearly = 0;

const labels = [];
const values = [];

trades.forEach(trade=>{

const p = parseFloat(trade.profit);

daily += p;
monthly += p;
yearly += p;

labels.push(trade.date);
values.push(p);

});

content.innerHTML = `

<h3>Analytics Account</h3>

<div class="analytics-grid">

<div class="analytics-box">
<div class="analytics-title">
Giornaliero
</div>
<div class="analytics-value">
${daily}€
</div>
</div>

<div class="analytics-box">
<div class="analytics-title">
Mensile
</div>
<div class="analytics-value">
${monthly}€
</div>
</div>

<div class="analytics-box">
<div class="analytics-title">
Annuale
</div>
<div class="analytics-value">
${yearly}€
</div>
</div>

</div>

<canvas id="analyticsChart"></canvas>
`;

setTimeout(()=>{

const ctx =
document.getElementById('analyticsChart');

new Chart(ctx, {

type: 'line',

data: {

labels: labels,

datasets: [{

label: 'Andamento Portfolio',

data: values,

borderWidth: 3,
tension:0.3

}]

},

options: {

responsive:true

}

});

},100);

}

/* CALENDAR */

if(page === "calendar"){

dashboard.style.display = "none";

content.style.display = "block";

title.innerText = "Calendario";

subtitle.innerText =
"Storico mensile";

let monthlyData = {};

trades.forEach(trade=>{

const month =
trade.date.substring(0,7);

if(!monthlyData[month]){

monthlyData[month] = {
count:0,
profit:0,
wins:0
};

}

monthlyData[month].count++;

monthlyData[month].profit +=
parseFloat(trade.profit);

if(parseFloat(trade.profit) > 0){

monthlyData[month].wins++;

}

});

let calendarHTML = `
<h3>Calendario Mensile</h3>
`;

for(let month in monthlyData){

const data = monthlyData[month];

const percentage =
Math.round(
(data.wins / data.count) * 100
);

calendarHTML += `

<div class="analytics-box"
style="margin-top:20px;">

<h3>${month}</h3>

<p>
Trade Totali:
${data.count}
</p>

<p>
Win Rate:
${percentage}%
</p>

<p>
Profitto/Perdita:
${data.profit}€
</p>

</div>

`;

}

content.innerHTML = calendarHTML;

}

/* SETTINGS */

if(page === "settings"){

dashboard.style.display = "none";

content.style.display = "block";

title.innerText = "Settings";

subtitle.innerText =
"Configurazione piattaforma";

content.innerHTML = `
<h3>Impostazioni</h3>

<button class="setting-btn"
onclick="toggleDarkMode()">

Dark Mode

</button>

<br><br>

<button class="setting-btn"
onclick="changeEquity()">

Modifica Equity

</button>

<br><br>

<button class="setting-btn"
onclick="resetTrades()">

Reset Trade

</button>
`;

}

}

/* CHANGE EQUITY */

function changeEquity(){

let newEquity =
prompt("Inserisci la nuova equity");

if(newEquity){

equity = newEquity;

localStorage.setItem("equity", equity);

updateStats();

}

}

/* DARK MODE */

function toggleDarkMode(){

document.body.classList.toggle("dark");

}

/* RESET */

function resetTrades(){

const confirmReset =
confirm("Vuoi eliminare tutti i trade?");

if(confirmReset){

trades = [];

saveTrades();

loadTrades();

showPage("dashboard");

}

}

/* START */

loadTrades();

showPage("dashboard");

</script>

</body>
</html>
