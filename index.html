<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeJournal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f3f4f6;
height:100vh;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#111827;
color:white;
padding:30px 20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:28px;
font-weight:bold;
margin-bottom:40px;
}

.menu{
display:flex;
flex-direction:column;
gap:15px;
}

.menu button{
background:#1f2937;
border:none;
padding:15px;
border-radius:12px;
color:white;
cursor:pointer;
font-size:16px;
transition:0.2s;
text-align:left;
}

.menu button:hover{
background:#374151;
}

/* MAIN */

.main{
flex:1;
padding:40px;
overflow:auto;
}

.title{
font-size:38px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#6b7280;
margin-bottom:40px;
}

/* DASHBOARD */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:40px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.card-title{
color:#6b7280;
margin-bottom:10px;
}

.card-value{
font-size:32px;
font-weight:bold;
}

.green{
color:#16a34a;
}

.red{
color:#dc2626;
}

/* TABLE */

.table-box{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th, td{
padding:15px;
text-align:left;
border-bottom:1px solid #e5e7eb;
}

th{
color:#6b7280;
}

/* PAGE CONTENT */

.page-content{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
font-size:18px;
line-height:1.8;
}

/* FORM */

.trade-form{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-bottom:25px;
margin-top:20px;
}

.trade-form input,
.trade-form select{
padding:12px;
border-radius:10px;
border:1px solid #d1d5db;
font-size:16px;
}

.trade-form button{
background:#111827;
color:white;
border:none;
padding:12px 20px;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.trade-form button:hover{
background:#374151;
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
EdgeJournal
</div>

<div class="menu">

<button onclick="showPage('dashboard')">
Dashboard
</button>

<button onclick="showPage('trades')">
Trades
</button>

<button onclick="showPage('analytics')">
Analytics
</button>

<button onclick="showPage('calendar')">
Calendario
</button>

<button onclick="showPage('settings')">
Settings
</button>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="title" id="pageTitle">
Dashboard
</div>

<div class="subtitle" id="pageSubtitle">
Benvenuto nel tuo Trading Journal
</div>

<!-- DASHBOARD -->

<div id="dashboardSection">

<div class="cards">

<div class="card">
<div class="card-title">Equity</div>
<div class="card-value">10,250€</div>
</div>

<div class="card">
<div class="card-title">Profitto Totale</div>
<div class="card-value green">+12.4%</div>
</div>

<div class="card">
<div class="card-title">Win Rate</div>
<div class="card-value">68%</div>
</div>

<div class="card">
<div class="card-title">Profitto Medio</div>
<div class="card-value green">+1.2%</div>
</div>

</div>

<div class="table-box">

<h2>Ultimi Trade</h2>

<!-- FORM -->

<div class="trade-form">

<input type="text" id="assetInput" placeholder="Asset">

<select id="typeInput">
<option>LONG</option>
<option>SHORT</option>
</select>

<input type="number" id="profitInput" placeholder="Profit/Loss">

<button onclick="addTrade()">
Aggiungi Trade
</button>

</div>

<!-- TABLE -->

<table id="tradeTable">

<tr>
<th>Asset</th>
<th>Tipo</th>
<th>Profit/Loss</th>
</tr>

<tr>
<td>XAU/USD</td>
<td>LONG</td>
<td class="green">+250€</td>
</tr>

<tr>
<td>US30</td>
<td>SHORT</td>
<td class="red">-80€</td>
</tr>

<tr>
<td>BTC/USD</td>
<td>LONG</td>
<td class="green">+420€</td>
</tr>

</table>

</div>

</div>

<!-- DYNAMIC CONTENT -->

<div class="page-content" id="dynamicContent">

Questa è la dashboard principale del tuo EdgeJournal.

</div>

</div>

<script>

/* MENU */

function showPage(page){

const title = document.getElementById("pageTitle");
const subtitle = document.getElementById("pageSubtitle");
const content = document.getElementById("dynamicContent");
const dashboard = document.getElementById("dashboardSection");

if(page === "dashboard"){

dashboard.style.display = "block";
content.style.display = "block";

title.innerText = "Dashboard";

subtitle.innerText = "Benvenuto nel tuo Trading Journal";

content.innerHTML = `
<h3>Panoramica Account</h3>

<p>Qui puoi monitorare rapidamente:</p>

<ul>
<li>Equity totale</li>
<li>Profitto account</li>
<li>Win Rate</li>
<li>Ultimi trade eseguiti</li>
</ul>
`;

}

if(page === "trades"){

dashboard.style.display = "none";
content.style.display = "block";

title.innerText = "Trades";

subtitle.innerText = "Gestione operazioni trading";

content.innerHTML = `
<h3>Lista Trades</h3>

<p>Qui potrai gestire tutte le operazioni trading.</p>
`;

}

if(page === "analytics"){

dashboard.style.display = "none";
content.style.display = "block";

title.innerText = "Analytics";

subtitle.innerText = "Statistiche e performance";

content.innerHTML = `
<h3>Analytics</h3>

<ul>
<li>Win Rate</li>
<li>Profit Factor</li>
<li>Drawdown</li>
<li>Performance mensile</li>
</ul>
`;

}

if(page === "calendar"){

dashboard.style.display = "none";
content.style.display = "block";

title.innerText = "Calendario";

subtitle.innerText = "Storico e pianificazione";

content.innerHTML = `
<h3>Calendario Trading</h3>

<p>Qui appariranno eventi e storico operazioni.</p>
`;

}

if(page === "settings"){

dashboard.style.display = "none";
content.style.display = "block";

title.innerText = "Settings";

subtitle.innerText = "Configurazione piattaforma";

content.innerHTML = `
<h3>Impostazioni</h3>

<ul>
<li>Tema</li>
<li>Notifiche</li>
<li>Broker</li>
<li>Profilo utente</li>
</ul>
`;

}

}

/* ADD TRADE */

function addTrade(){

const asset = document.getElementById("assetInput").value;
const type = document.getElementById("typeInput").value;
const profit = document.getElementById("profitInput").value;

if(asset === "" || profit === ""){
alert("Compila tutti i campi");
return;
}

const table = document.getElementById("tradeTable");

const row = table.insertRow(-1);

const cell1 = row.insertCell(0);
const cell2 = row.insertCell(1);
const cell3 = row.insertCell(2);

cell1.innerHTML = asset;
cell2.innerHTML = type;

if(profit >= 0){
cell3.innerHTML = `<span class="green">+${profit}€</span>`;
}else{
cell3.innerHTML = `<span class="red">${profit}€</span>`;
}

document.getElementById("assetInput").value = "";
document.getElementById("profitInput").value = "";

}

</script>

</body>
</html>
