<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EdgeJournal PRO</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="sidebar">

<div class="logo">
EdgeJournal
</div>

<div class="menu">

<button onclick="showPage('dashboard')">
Dashboard
</button>

<button onclick="showPage('trades')">
Trades
</button>

<button onclick="showPage('analytics')">
Analytics
</button>

<button onclick="showPage('calendar')">
Calendario
</button>

<button onclick="showPage('settings')">
Settings
</button>

</div>

</div>

<div class="main">

<div class="title" id="pageTitle">
Dashboard
</div>

<div class="subtitle" id="pageSubtitle">
Panoramica generale account
</div>

<div id="dashboardPage">

<div class="cards">

<div class="card">
<div class="card-title">Equity</div>
<div class="card-value" id="equityValue">
0€
</div>
</div>

<div class="card">
<div class="card-title">Profitto Totale</div>
<div class="card-value" id="profitValue">
0€
</div>
</div>

<div class="card">
<div class="card-title">Profit %</div>
<div class="card-value" id="profitPercentValue">
0%
</div>
</div>

<div class="card">
<div class="card-title">Win Rate</div>
<div class="card-value" id="winrateValue">
0%
</div>
</div>

</div>

<div class="page-content">

<h3>Dashboard Operativa</h3>

<p>
Monitora la crescita del tuo account e le performance operative.
</p>

</div>

</div>

<div id="tradesPage" class="hidden">

<div class="table-box">

<h2>Gestione Trades</h2>

<div class="trade-form">

<input type="date" id="dateInput">

<input type="text" id="assetInput" placeholder="Asset">

<select id="typeInput">
<option>LONG</option>
<option>SHORT</option>
</select>

<input type="number" id="profitInput" placeholder="Profit/Loss">

<button onclick="addTrade()">
Aggiungi Trade
</button>

</div>

<table id="tradeTable">

<tr>
<th>Data</th>
<th>Asset</th>
<th>Tipo</th>
<th>Profit/Loss</th>
<th>Azione</th>
</tr>

</table>

</div>

</div>

<div id="dynamicContent"></div>

</div>

<script src="app.js"></script>

</body>
</html>
